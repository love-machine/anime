name: Franime Bot Autonome

on:
  schedule:
    - cron: '0 * * * *' # S'exécute toutes les heures (pile)
  workflow_dispatch:      # Permet de le lancer manuellement pour tester

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Autorise GitHub à modifier tes fichiers (le .db)

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation Forcée
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          echo "--- CONTENU DU DOSSIER ---"
          ls -R
          echo "--- CONTENU DE REQUIREMENTS.TXT ---"
          cat requirements.txt || echo "Fichier introuvable"

      - name: Lancer le Bot
        run: python franime.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Sauvegarder l'historique (Base de données)
        run: |
          git config --global user.name "Github Actions Bot"
          git config --global user.email "actions@github.com"
          git add historique.db
          git commit -m "💾 MAJ Base de données [skip ci]" || echo "Aucun changement"
          git push
